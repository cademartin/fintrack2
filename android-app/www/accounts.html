<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Tea Tracker — Accounts</title>
    <meta name="description" content="Manage your bank and cash accounts.">

    <!-- Capacitor Bridge (injected at build time) -->
    <script src="capacitor.js"></script>

    <!-- Tailwind CSS: Local-First -->
    <script>
        (function () {
            var s = document.createElement('script');
            s.src = 'assets/js/tailwind.js';
            document.head.appendChild(s);
        })();
    </script>

    <!-- Outfit Font: Local-First -->
    <style>
        @font-face { font-family: 'Outfit'; font-weight: 300; font-style: normal; font-display: swap; src: url('assets/fonts/outfit-300.woff2') format('woff2'); }
        @font-face { font-family: 'Outfit'; font-weight: 400; font-style: normal; font-display: swap; src: url('assets/fonts/outfit-400.woff2') format('woff2'); }
        @font-face { font-family: 'Outfit'; font-weight: 600; font-style: normal; font-display: swap; src: url('assets/fonts/outfit-600.woff2') format('woff2'); }
        @font-face { font-family: 'Outfit'; font-weight: 800; font-style: normal; font-display: swap; src: url('assets/fonts/outfit-800.woff2') format('woff2'); }
        body {
            font-family: 'Outfit', sans-serif;
            padding-top: env(safe-area-inset-top, 0px);
            padding-bottom: env(safe-area-inset-bottom, 0px);
        }
    </style>

    <!-- Lucide Icons: Local-First -->
    <script>
        (function () {
            var s = document.createElement('script');
            s.src = 'assets/js/lucide.js';
            s.onload = function () { if (typeof lucide !== 'undefined' && lucide.createIcons) lucide.createIcons(); };
            document.head.appendChild(s);
        })();
    </script>

    <!-- Offline JS Engine & API -->
    <script src="js/db.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/api.js"></script>
</head>

<body class="bg-gray-50 text-gray-900">

    <div id="layout-wrapper">
        <div class="space-y-6">
            <div class="flex items-center justify-between">
                <div class="flex items-baseline gap-3">
                    <h2 class="text-3xl font-bold tracking-tight">Accounts</h2>
                    <span id="totalBalanceLabel" class="text-sm font-medium text-gray-500">Total Balance: <span id="totalBalance" class="font-bold text-green-600">$0.00</span></span>
                </div>
                <button id="openAccountModalBtn"
                    class="px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 transition-colors">
                    Add Account
                </button>
            </div>

            <div id="accountsGrid" class="grid gap-6 md:grid-cols-2 lg:grid-cols-3">
                <div class="col-span-full text-center py-10 bg-white rounded-xl border border-dashed border-gray-300">
                    <p class="text-gray-500">Loading accounts...</p>
                </div>
            </div>
        </div>
    </div>

    <!-- New Account Modal -->
    <div id="newAccountModal" class="fixed inset-0 bg-gray-600 bg-opacity-50 overflow-y-auto h-full w-full hidden z-50">
        <div class="relative top-20 mx-auto p-5 border w-96 shadow-lg rounded-md bg-white">
            <div class="mt-3 text-center">
                <h3 class="text-lg leading-6 font-medium text-gray-900">Add New Account</h3>
                <div class="mt-2 px-7 py-3">
                    <input type="text" id="acc-name" placeholder="Account Name"
                        class="mb-3 px-3 py-2 border rounded w-full" required>
                    <input type="number" id="acc-balance" placeholder="Initial Balance"
                        class="mb-3 px-3 py-2 border rounded w-full" step="0.01" required>
                    <select id="acc-type" class="mb-3 px-3 py-2 border rounded w-full">
                        <option value="Cash">Cash</option>
                        <option value="Bank">Bank</option>
                        <option value="Mobile Money">Mobile Money</option>
                        <option value="Other">Other</option>
                    </select>
                    <label class="block text-left text-sm text-gray-700 mb-1">Color</label>
                    <div class="flex space-x-2 mb-3">
                        <button type="button" onclick="selectColor('blue-600')"
                            class="w-8 h-8 rounded-full bg-blue-600 focus:ring-2 ring-offset-2 ring-blue-600"></button>
                        <button type="button" onclick="selectColor('green-600')"
                            class="w-8 h-8 rounded-full bg-green-600 focus:ring-2 ring-offset-2 ring-green-600"></button>
                        <button type="button" onclick="selectColor('purple-600')"
                            class="w-8 h-8 rounded-full bg-purple-600 focus:ring-2 ring-offset-2 ring-purple-600"></button>
                        <button type="button" onclick="selectColor('yellow-500')"
                            class="w-8 h-8 rounded-full bg-yellow-500 focus:ring-2 ring-offset-2 ring-yellow-500"></button>
                        <button type="button" onclick="selectColor('red-600')"
                            class="w-8 h-8 rounded-full bg-red-600 focus:ring-2 ring-offset-2 ring-red-600"></button>
                    </div>
                    <input type="hidden" id="acc-color" value="blue-600">
                </div>
                <div class="items-center px-4 py-3">
                    <button id="createAccountBtn"
                        class="px-4 py-2 bg-green-500 text-white text-base font-medium rounded-md w-full shadow-sm hover:bg-green-700 focus:outline-none focus:ring-2 focus:ring-green-300">
                        Create Account
                    </button>
                    <button id="cancelAccountBtn"
                        class="mt-3 px-4 py-2 bg-gray-300 text-gray-700 text-base font-medium rounded-md w-full shadow-sm hover:bg-gray-400 focus:outline-none">
                        Cancel
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="js/layout.js"></script>
    <script src="js/back-button.js"></script>
    <script>
        // Color selection
        function selectColor(colorClass) {
            document.getElementById('acc-color').value = colorClass;
        }

        // Modal helpers
        document.getElementById('openAccountModalBtn').addEventListener('click', () => {
            document.getElementById('newAccountModal').classList.remove('hidden');
        });
        document.getElementById('cancelAccountBtn').addEventListener('click', () => {
            document.getElementById('newAccountModal').classList.add('hidden');
        });

        // Map a Tailwind color name to an inline hex so it works without purge
        const colorHexMap = {
            'blue-600':   '#2563eb',
            'green-600':  '#16a34a',
            'purple-600': '#9333ea',
            'yellow-500': '#eab308',
            'red-600':    '#dc2626',
        };

        async function loadAccounts() {
            try {
                const accounts = await API.get('/accounts/');
                const grid = document.getElementById('accountsGrid');
                grid.innerHTML = '';

                if (accounts.length === 0) {
                    grid.innerHTML = `
                        <div class="col-span-full text-center py-10 bg-white rounded-xl border border-dashed border-gray-300">
                            <p class="text-gray-500">No accounts created.</p>
                        </div>`;
                    document.getElementById('totalBalance').textContent = formatCurrency(0);
                    return;
                }

                const totalBal = accounts.reduce((sum, acc) => sum + (acc.balance || 0), 0);
                document.getElementById('totalBalance').textContent = formatCurrency(totalBal);
                document.getElementById('totalBalance').className = totalBal >= 0
                    ? 'font-bold text-green-600'
                    : 'font-bold text-red-600';

                accounts.forEach(acc => {
                    const hex = colorHexMap[acc.color] || '#2563eb';
                    const div = document.createElement('div');
                    div.className = 'bg-white rounded-xl shadow-sm border border-gray-200 p-6 relative group';
                    div.innerHTML = `
                        <div class="flex items-center justify-between mb-4">
                            <h3 class="font-semibold text-lg">${acc.name}</h3>
                            <span class="px-2 py-1 text-xs font-semibold rounded-full bg-gray-100 text-gray-800">${acc.type}</span>
                        </div>
                        <p class="text-3xl font-bold text-gray-900 mb-2">${formatCurrency(acc.balance)}</p>
                        <div class="w-full bg-gray-200 rounded-full h-2.5">
                            <div class="h-2.5 rounded-full" style="width:100%; background-color:${hex}"></div>
                        </div>
                        <button onclick="deleteAccount('${acc.id}')"
                            class="absolute top-4 right-4 text-gray-400 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-opacity">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                                <path fill-rule="evenodd" d="M9 2a1 1 0 00-.894.553L7.382 4H4a1 1 0 000 2v10a2 2 0 002 2h8a2 2 0 002-2V6a1 1 0 100-2h-3.382l-.724-1.447A1 1 0 0011 2H9zM7 8a1 1 0 012 0v6a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v6a1 1 0 102 0V8a1 1 0 00-1-1z" clip-rule="evenodd" />
                            </svg>
                        </button>
                    `;
                    grid.appendChild(div);
                });

            } catch (error) {
                console.error('Error loading accounts:', error);
            }
        }

        async function deleteAccount(id) {
            if (!confirm('Are you sure you want to delete this account?')) return;
            try {
                await API.delete(`/accounts/${id}`);
                loadAccounts();
            } catch (error) {
                alert('Failed to delete account');
            }
        }

        document.getElementById('createAccountBtn').addEventListener('click', async () => {
            const data = {
                name: document.getElementById('acc-name').value,
                balance: parseFloat(document.getElementById('acc-balance').value),
                type: document.getElementById('acc-type').value,
                color: document.getElementById('acc-color').value
            };

            try {
                await API.post('/accounts/', data);
                document.getElementById('newAccountModal').classList.add('hidden');
                loadAccounts();
                document.getElementById('acc-name').value = '';
                document.getElementById('acc-balance').value = '';
            } catch (error) {
                alert('Failed to create account');
                console.error(error);
            }
        });

        window.addEventListener('settingsLoaded', loadAccounts, { once: true });
    </script>

</body>
</html>
